project_name: "particle_simulation"
project_path: "/home/pyt/program/particle_simulation_chatgpt"

executable:
  path: "/home/pyt/program/particle_simulation/build/particle_simulation"
  args: ["/home/pyt/program/particle_simulation/configs/default.json"]

code_scope:
  source_roots: ["src", "include"]
  exclude_dirs: ["build", "third_party", "test", "vendor", "deps"]

llm:
  provider: "OpenAI"
  api_key: "sk-7244ac75460843fc85a9f858036be9e6"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  # 控制大模型输出的随机程度，范围通常为0~2，0~0.2模型选最稳妥的词，每次输出几乎一样（适用于代码生成、翻译、数学推理）
  # 0.5~0.8有一定变化，但大体靠谱（适用于写作、总结）
  # 1.0+放飞自我，每次输出差异很大（适用于创意写作、头脑风暴）
  temperature: 0.1
  max_tokens: 4096                                                 # 最大输出 token
  timeout: 120                                                     # 请求超时秒数